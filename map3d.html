<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Black Summer — 3D Fire Map</title>

  <!-- Three.js r160 (ES modules via importmap) -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <style>
    :root {
      --bg: #111827;
      --text: #e8c9a0;
      --accent: #c0392b;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: Georgia, 'Times New Roman', serif;
    }

    /* Three.js renderer canvas fills the viewport */
    #scene-canvas {
      display: block;
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    /* Hidden webcam feed (MediaPipe input, task 3) */
    #webcam {
      position: fixed;
      top: 0;
      left: 0;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }

    /* Debug overlay for hand landmark dots (task 3) */
    #debug-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 0;
      height: 0;
      pointer-events: none;
      z-index: 30;
    }

    /* Back-to-story link */
    #back-link {
      position: fixed;
      top: 20px;
      left: 24px;
      z-index: 40;
      color: var(--text);
      text-decoration: none;
      font-size: 1rem;
      letter-spacing: 0.03em;
      padding: 8px 14px;
      background: rgba(6, 10, 18, 0.55);
      border: 1px solid rgba(232, 201, 160, 0.25);
      border-radius: 4px;
      transition: color 0.2s ease, border-color 0.2s ease;
    }
    #back-link:hover {
      color: #fff;
      border-color: var(--accent);
    }

    /* Webcam preview thumbnail (task 3 populates contents) */
    #webcam-preview {
      position: fixed;
      right: 24px;
      bottom: 70px;
      z-index: 40;
      width: 100px;
      height: 75px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 4px;
      background: rgba(6, 10, 18, 0.7);
      overflow: hidden;
      display: none;
      transform: scaleX(-1); /* mirror applied to container instead of the video element */
    }

    /* Gesture status badge (content from task 3) */
    #gesture-status {
      position: fixed;
      right: 24px;
      bottom: 24px;
      z-index: 40;
      min-width: 110px;
      padding: 4px 10px;
      font-size: 13px;
      text-align: center;
      color: #e8c9a0;
      background: rgba(0, 0, 0, 0.6);
      border: 1px solid rgba(232, 201, 160, 0.25);
      border-radius: 4px;
      transition: border-color 0.25s ease;
      cursor: pointer;
    }

    /* Gesture legend panel (toggled by clicking the status badge) */
    #gesture-guide {
      position: fixed;
      right: 24px;
      bottom: 58px;
      z-index: 40;
      width: 220px;
      padding: 10px 12px;
      font-size: 11.5px;
      line-height: 1.75;
      color: #e8c9a0;
      background: rgba(6, 10, 18, 0.88);
      border: 1px solid rgba(232, 201, 160, 0.2);
      border-radius: 4px;
      display: none;
      backdrop-filter: blur(4px);
    }
    #gesture-guide.open { display: block; }
    #gesture-guide h4 {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      opacity: 0.6;
      margin-bottom: 6px;
    }
    #gesture-guide .row { display: flex; gap: 6px; }
    #gesture-guide .icon { flex: 0 0 22px; text-align: center; }
    #gesture-guide .desc { opacity: 0.85; }
  </style>
</head>
<body>
  <!-- MediaPipe input (hidden) -->
  <video id="webcam" autoplay playsinline muted></video>

  <!-- Hand-landmark debug overlay (task 3) -->
  <canvas id="debug-canvas"></canvas>

  <!-- Three.js renderer target -->
  <canvas id="scene-canvas"></canvas>

  <!-- Navigation back to the main story -->
  <a id="back-link" href="index.html">&larr; Return to story</a>

  <!-- Webcam preview + gesture badge (task 3) -->
  <div id="webcam-preview"></div>
  <div id="gesture-guide" role="tooltip">
    <h4>Gesture Controls</h4>
    <div class="row"><span class="icon">✊</span><span class="desc">Fist + move — Orbit camera</span></div>
    <div class="row"><span class="icon">🤏</span><span class="desc">Pinch tight — Zoom in</span></div>
    <div class="row"><span class="icon">🤏</span><span class="desc">Relax pinch — Zoom out</span></div>
    <div class="row"><span class="icon">☝️</span><span class="desc">Point finger — Pan view</span></div>

    <div class="row"><span class="icon">✋</span><span class="desc">Open palm — Safe reposition</span></div>
  </div>
  <div id="gesture-status">Gestures: off</div>

  <!-- MediaPipe (classic scripts — must be non-module for CDN globals) -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/hands.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1675466862/camera_utils.js" crossorigin="anonymous"></script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    /* ------------------------------------------------------------------ *
     * Scene bootstrap
     * ------------------------------------------------------------------ */
    const canvas = document.getElementById('scene-canvas');

    const scene = new THREE.Scene();

    const camera = new THREE.PerspectiveCamera(
      50,
      window.innerWidth / window.innerHeight,
      0.1,
      100
    );
    camera.position.set(0, 1.8, 2.5);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setClearColor('#060a12');

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 0, 0);
    controls.update();

    // Ambient fill
    const ambient = new THREE.AmbientLight('#ffffff', 0.4);
    scene.add(ambient);

    // Warm point light over the NSW coast fire cluster
    const fireLight = new THREE.PointLight('#f97316', 1.5);
    fireLight.position.set(0.9, 0.8, -0.3);
    scene.add(fireLight);

    /* ------------------------------------------------------------------ *
     * Ocean plane
     * ------------------------------------------------------------------ */
    const oceanGeo = new THREE.PlaneGeometry(6, 6);
    const oceanMat = new THREE.MeshStandardMaterial({
      color: '#060a12',
      roughness: 1,
      metalness: 0
    });
    const ocean = new THREE.Mesh(oceanGeo, oceanMat);
    ocean.rotation.x = -Math.PI / 2;
    ocean.position.y = -0.02;
    scene.add(ocean);

    /* ------------------------------------------------------------------ *
     * Projection: lon/lat -> normalised [-1, 1] space (Mercator-ish)
     * ------------------------------------------------------------------ */
    function project([lon, lat]) {
      const x = (lon - 113) / (154 - 113) * 2 - 1;
      const y = (lat - (-44)) / ((-10) - (-44)) * 2 - 1;
      return [x * 1.1, y * 0.9]; // slight scale to fill view
    }

    /* ------------------------------------------------------------------ *
     * Point-in-polygon (ray casting), tested against a set of rings.
     * `rings` is an array of rings; each ring is [[x, y], ...].
     * A point is inside Australia if inside an odd number of crossings
     * within ANY single ring.
     * ------------------------------------------------------------------ */
    function pointInRing(px, py, ring) {
      let inside = false;
      for (let i = 0, j = ring.length - 1; i < ring.length; j = i++) {
        const xi = ring[i][0], yi = ring[i][1];
        const xj = ring[j][0], yj = ring[j][1];
        const intersect =
          (yi > py) !== (yj > py) &&
          px < ((xj - xi) * (py - yi)) / (yj - yi) + xi;
        if (intersect) inside = !inside;
      }
      return inside;
    }

    function pointInRings(px, py, rings) {
      for (let r = 0; r < rings.length; r++) {
        if (pointInRing(px, py, rings[r])) return true;
      }
      return false;
    }

    /* ------------------------------------------------------------------ *
     * Height field
     * ------------------------------------------------------------------ */
    // DEM pixel data loaded from data/australia_dem.png
    const DEM_W = 512, DEM_H = 424;
    const DEM_LON_MIN = 112.9999, DEM_LON_MAX = 153.9999;
    const DEM_LAT_MIN = -44.0001, DEM_LAT_MAX = -10.0001;
    let demPixels = null; // Float32Array, 0-1 normalised elevation

    async function loadDEM() {
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          canvas.width = DEM_W; canvas.height = DEM_H;
          canvas.getContext('2d').drawImage(img, 0, 0);
          const rgba = canvas.getContext('2d').getImageData(0, 0, DEM_W, DEM_H).data;
          demPixels = new Float32Array(DEM_W * DEM_H);
          for (let i = 0; i < DEM_W * DEM_H; i++) demPixels[i] = rgba[i * 4] / 255;
          console.log('[map3d] DEM loaded');
          resolve();
        };
        img.onerror = () => {
          console.warn('[map3d] DEM not found — terrain will be flat');
          demPixels = new Float32Array(DEM_W * DEM_H);
          resolve();
        };
        img.src = 'data/australia_dem.png';
      });
    }

    function heightAt(x, y) {
      if (!demPixels) return 0.02;
      // Reverse-project normalised (x, y) → geographic (lon, lat)
      const lon = (x / 1.1 + 1) / 2 * (DEM_LON_MAX - DEM_LON_MIN) + DEM_LON_MIN;
      const lat = (y / 0.9 + 1) / 2 * (DEM_LAT_MAX - DEM_LAT_MIN) + DEM_LAT_MIN;
      // Map to pixel coords; PNG row 0 = north (lat=-10), row H-1 = south (lat=-44)
      const col = (lon - DEM_LON_MIN) / (DEM_LON_MAX - DEM_LON_MIN) * (DEM_W - 1);
      const row = (1 - (lat - DEM_LAT_MIN) / (DEM_LAT_MAX - DEM_LAT_MIN)) * (DEM_H - 1);
      const c0 = Math.max(0, Math.min(DEM_W - 2, Math.floor(col)));
      const r0 = Math.max(0, Math.min(DEM_H - 2, Math.floor(row)));
      const fc = col - c0, fr = row - r0;
      const v00 = demPixels[r0 * DEM_W + c0],       v10 = demPixels[r0 * DEM_W + c0 + 1];
      const v01 = demPixels[(r0+1) * DEM_W + c0],   v11 = demPixels[(r0+1) * DEM_W + c0 + 1];
      // PNG normalised to actual max 1918m; multiply by 0.8 for ~2.5x vertical exaggeration
      return (v00*(1-fc)*(1-fr) + v10*fc*(1-fr) + v01*(1-fc)*fr + v11*fc*fr) * 0.8;
    }

    function heightToColor(h) {
      // Thresholds tuned to real DEM with 0.8 scale: h=0.8 → 1918m
      if (h < 0.04)  return new THREE.Color('#1a3a2a'); // 0-96m  coastal plains
      if (h < 0.12)  return new THREE.Color('#2a5038'); // 96-288m low plateau
      if (h < 0.25)  return new THREE.Color('#3d6e4a'); // 288-600m highlands
      return new THREE.Color('#5a7a4a');                // peaks (GDR / Snowy)
    }

    /* ------------------------------------------------------------------ *
     * Bowyer-Watson Delaunay triangulation
     * Returns array of [i, j, k] index triples into the supplied points.
     * ------------------------------------------------------------------ */
    function circumcircle(a, b, c) {
      const ax = a[0], ay = a[1];
      const bx = b[0], by = b[1];
      const cx = c[0], cy = c[1];
      const d = 2 * (ax * (by - cy) + bx * (cy - ay) + cx * (ay - by));
      if (Math.abs(d) < 1e-12) {
        return { cx: 0, cy: 0, r: Infinity };
      }
      const a2 = ax * ax + ay * ay;
      const b2 = bx * bx + by * by;
      const c2 = cx * cx + cy * cy;
      const ux = (a2 * (by - cy) + b2 * (cy - ay) + c2 * (ay - by)) / d;
      const uy = (a2 * (cx - bx) + b2 * (ax - cx) + c2 * (bx - ax)) / d;
      const dx = ux - ax;
      const dy = uy - ay;
      return { cx: ux, cy: uy, r: Math.sqrt(dx * dx + dy * dy) };
    }

    function delaunay(points) {
      const n = points.length;
      if (n < 3) return [];

      // Bounding box of the points
      let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
      for (const p of points) {
        if (p[0] < minX) minX = p[0];
        if (p[1] < minY) minY = p[1];
        if (p[0] > maxX) maxX = p[0];
        if (p[1] > maxY) maxY = p[1];
      }
      const dx = maxX - minX || 1;
      const dy = maxY - minY || 1;
      const dmax = Math.max(dx, dy);
      const midX = (minX + maxX) / 2;
      const midY = (minY + maxY) / 2;

      // Super-triangle vertices appended to the working point list.
      // Indices n, n+1, n+2 reference the super-triangle.
      const sp0 = [midX - 20 * dmax, midY - dmax];
      const sp1 = [midX, midY + 20 * dmax];
      const sp2 = [midX + 20 * dmax, midY - dmax];
      const pts = points.concat([sp0, sp1, sp2]);

      const superA = n, superB = n + 1, superC = n + 2;

      // A triangle stores its vertex indices and its circumcircle.
      function makeTri(i, j, k) {
        const cc = circumcircle(pts[i], pts[j], pts[k]);
        return { i, j, k, cc };
      }

      let triangulation = [makeTri(superA, superB, superC)];

      for (let pi = 0; pi < n; pi++) {
        const p = pts[pi];
        const badTriangles = [];

        for (const t of triangulation) {
          const ddx = p[0] - t.cc.cx;
          const ddy = p[1] - t.cc.cy;
          if (ddx * ddx + ddy * ddy < t.cc.r * t.cc.r) {
            badTriangles.push(t);
          }
        }

        // Build the boundary polygon: edges that appear in exactly one bad triangle.
        const edgeCount = new Map();
        const edgeKey = (a, b) => (a < b ? a + '_' + b : b + '_' + a);

        for (const t of badTriangles) {
          const edges = [
            [t.i, t.j],
            [t.j, t.k],
            [t.k, t.i]
          ];
          for (const [a, b] of edges) {
            const key = edgeKey(a, b);
            const entry = edgeCount.get(key);
            if (entry) {
              entry.count++;
            } else {
              edgeCount.set(key, { a, b, count: 1 });
            }
          }
        }

        // Remove the bad triangles.
        const badSet = new Set(badTriangles);
        triangulation = triangulation.filter((t) => !badSet.has(t));

        // Re-triangulate the polygonal hole with the new point.
        for (const { a, b, count } of edgeCount.values()) {
          if (count === 1) {
            triangulation.push(makeTri(a, b, pi));
          }
        }
      }

      // Drop any triangle that touches the super-triangle vertices.
      const result = [];
      for (const t of triangulation) {
        if (
          t.i === superA || t.i === superB || t.i === superC ||
          t.j === superA || t.j === superB || t.j === superC ||
          t.k === superA || t.k === superB || t.k === superC
        ) {
          continue;
        }
        result.push([t.i, t.j, t.k]);
      }
      return result;
    }

    /* ------------------------------------------------------------------ *
     * Build the terrain from the GeoJSON
     * ------------------------------------------------------------------ */
    async function buildTerrain() {
      const res = await fetch('data/australia_states_hd.geojson');
      const geojson = await res.json();

      // 5a. Extract the outer ring of every polygon, projected to [-1,1].
      const allRings = [];          // projected rings, for point-in-polygon
      const coastVertices = [];     // projected coastline vertices to keep

      for (const feature of geojson.features) {
        const geom = feature.geometry;
        if (!geom) continue;

        let polygons = [];
        if (geom.type === 'Polygon') {
          polygons = [geom.coordinates];
        } else if (geom.type === 'MultiPolygon') {
          polygons = geom.coordinates;
        } else {
          continue;
        }

        for (const poly of polygons) {
          // poly[0] is the outer ring (subsequent entries are holes).
          const outer = poly[0];
          if (!outer || outer.length < 3) continue;
          const projected = outer.map(project);
          allRings.push(projected);
          // Decimate coast vertices before triangulation: skip tiny offshore
          // islands and stride-sample longer rings to ~100 points each.
          if (projected.length < 10) continue; // skip tiny islands
          const stride = Math.max(1, Math.floor(projected.length / 150));
          for (let vi = 0; vi < projected.length; vi += stride) {
            coastVertices.push(projected[vi]);
          }
        }
      }

      // 5d. Regular grid sampling over [-1.1, 1.1] x [-0.9, 0.9].
      const GRID_X = 120;
      const GRID_Y = 90;
      const X_MIN = -1.1, X_MAX = 1.1;
      const Y_MIN = -0.9, Y_MAX = 0.9;

      const interiorPoints = [];
      for (let ix = 0; ix < GRID_X; ix++) {
        const px = X_MIN + (X_MAX - X_MIN) * (ix / (GRID_X - 1));
        for (let iy = 0; iy < GRID_Y; iy++) {
          const py = Y_MIN + (Y_MAX - Y_MIN) * (iy / (GRID_Y - 1));
          if (pointInRings(px, py, allRings)) {
            interiorPoints.push([px, py]);
          }
        }
      }

      // Combine interior grid points + coastline vertices, de-duplicating
      // near-coincident points so the triangulation stays robust.
      const points2D = [];
      const seen = new Set();
      const addPoint = (p) => {
        const key = p[0].toFixed(4) + ',' + p[1].toFixed(4);
        if (seen.has(key)) return;
        seen.add(key);
        points2D.push(p);
      };
      for (const p of interiorPoints) addPoint(p);
      for (const p of coastVertices) addPoint(p);

      // 5e. Triangulate.
      const tris = delaunay(points2D);

      // 5f. Height per point.
      const heights = new Float32Array(points2D.length);
      for (let i = 0; i < points2D.length; i++) {
        heights[i] = heightAt(points2D[i][0], points2D[i][1]);
      }

      // Keep only triangles whose centroid lies inside Australia, so the
      // mesh follows the coastline rather than filling the convex hull.
      const keptTris = [];
      for (const [i, j, k] of tris) {
        const cx = (points2D[i][0] + points2D[j][0] + points2D[k][0]) / 3;
        const cy = (points2D[i][1] + points2D[j][1] + points2D[k][1]) / 3;
        if (pointInRings(cx, cy, allRings)) {
          keptTris.push([i, j, k]);
        }
      }

      // 5g. Build a non-indexed BufferGeometry (flat shading, per-face colour).
      const positions = [];
      const normals = [];
      const colors = [];

      const va = new THREE.Vector3();
      const vb = new THREE.Vector3();
      const vc = new THREE.Vector3();
      const e1 = new THREE.Vector3();
      const e2 = new THREE.Vector3();
      const nrm = new THREE.Vector3();

      for (const [i, j, k] of keptTris) {
        // 3D positions: (px, height, -py)
        va.set(points2D[i][0], heights[i], -points2D[i][1]);
        vb.set(points2D[j][0], heights[j], -points2D[j][1]);
        vc.set(points2D[k][0], heights[k], -points2D[k][1]);

        // Flat face normal via cross product.
        e1.subVectors(vb, va);
        e2.subVectors(vc, va);
        nrm.crossVectors(e1, e2).normalize();
        if (nrm.y < 0) nrm.negate(); // keep normals pointing up

        // Per-face colour from average height.
        const avgH = (heights[i] + heights[j] + heights[k]) / 3;
        const col = heightToColor(avgH);

        for (const v of [va, vb, vc]) {
          positions.push(v.x, v.y, v.z);
          normals.push(nrm.x, nrm.y, nrm.z);
          colors.push(col.r, col.g, col.b);
        }
      }

      const geometry = new THREE.BufferGeometry();
      geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
      geometry.setAttribute('normal', new THREE.Float32BufferAttribute(normals, 3));
      geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));

      const material = new THREE.MeshStandardMaterial({
        vertexColors: true,
        flatShading: true,
        roughness: 0.9,
        metalness: 0,
        side: THREE.DoubleSide
      });

      const terrain = new THREE.Mesh(geometry, material);
      scene.add(terrain);

      // ---- State boundary lines ----------------------------------------
      const STATE_COLORS = {
        'New South Wales':        '#D55E00',
        'Victoria':               '#56B4E9',
        'Queensland':             '#E69F00',
        'South Australia':        '#009E73',
        'Western Australia':      '#0072B2',
        'Tasmania':               '#F0E442',
        'Northern Territory':     '#CC79A7',
        'Australian Capital Territory': '#bbbbbb',
      };

      for (const feature of geojson.features) {
        const geom = feature.geometry;
        if (!geom) continue;
        const stateName = feature.properties?.STATE_NAME ?? '';
        const color = STATE_COLORS[stateName] ?? '#aaaaaa';
        const mat = new THREE.LineBasicMaterial({ color, linewidth: 1, transparent: true, opacity: 0.85, depthTest: false });

        const polys = geom.type === 'Polygon'
          ? [geom.coordinates]
          : geom.coordinates;           // MultiPolygon

        for (const poly of polys) {
          const outer = poly[0];
          if (!outer || outer.length < 3) continue;
          const verts = [];
          for (const coord of outer) {
            const [px, py] = project(coord);
            verts.push(px, heightAt(px, py) + 0.008, -py);
          }
          const geo = new THREE.BufferGeometry();
          geo.setAttribute('position', new THREE.Float32BufferAttribute(verts, 3));
          const line = new THREE.LineLoop(geo, mat);
          line.renderOrder = 1;
          scene.add(line);
        }
      }
      // ------------------------------------------------------------------

      console.log(
        `[map3d] terrain built: ${points2D.length} points, ${keptTris.length} triangles`
      );
    }

    /* ------------------------------------------------------------------ *
     * Fire data loading
     * ------------------------------------------------------------------ */
    async function loadFireData() {
      const resp = await fetch('data/fire_sample_map.csv');
      if (!resp.ok) throw new Error(`[map3d] CSV fetch failed: ${resp.status} ${resp.url}`);
      const text = await resp.text();
      const lines = text.trim().split('\n');
      const headers = lines[0].split(',').map(s => s.trim());
      const latIdx = headers.indexOf('latitude');
      const lonIdx = headers.indexOf('longitude');
      const frpIdx = headers.indexOf('frp');

      let points = [];
      for (let i = 1; i < lines.length; i++) {
        const cols = lines[i].split(',');
        const lat = parseFloat(cols[latIdx]);
        const lon = parseFloat(cols[lonIdx]);
        const frp = parseFloat(cols[frpIdx]);
        if (!isNaN(lat) && !isNaN(lon) && !isNaN(frp) && frp > 0) {
          points.push({ lat, lon, frp });
        }
      }

      // Subsample to max 3000 points (random sample to keep variety)
      if (points.length > 3000) {
        points = points.sort(() => Math.random() - 0.5).slice(0, 3000);
      }

      console.log(`[map3d] loaded ${points.length} fire points`);
      return points;
    }

    /* ------------------------------------------------------------------ *
     * Flame geometry constants
     * ------------------------------------------------------------------ */
    const RADIAL_SEGS = 8;
    const HEIGHT_SEGS = 6;
    const SWAY_AMP = 0.012;
    const SWAY_FREQ = 3.5;

    function flameColor(t) {
      if (t < 0.4)  return new THREE.Color('#7f1d1d').lerp(new THREE.Color('#ef4444'), t / 0.4);
      if (t < 0.7)  return new THREE.Color('#ef4444').lerp(new THREE.Color('#f97316'), (t - 0.4) / 0.3);
      if (t < 0.9)  return new THREE.Color('#f97316').lerp(new THREE.Color('#fbbf24'), (t - 0.7) / 0.2);
      return new THREE.Color('#fde68a');
    }

    /* ------------------------------------------------------------------ *
     * Build flames and fire dots from loaded fire points
     * ------------------------------------------------------------------ */
    const flameGeometries = [];

    function buildFlames(points) {
      // Sort by frp descending; top 1000 get animated flames, rest get dots
      points.sort((a, b) => b.frp - a.frp);
      const flamePoints = points.slice(0, 1000);
      const dotPoints   = points.slice(1000, 3000);

      // ---- Flat dots for lower-FRP points --------------------------------
      if (dotPoints.length > 0) {
        const dotGeo = new THREE.BufferGeometry();
        const posArr = new Float32Array(dotPoints.length * 3);
        const colArr = new Float32Array(dotPoints.length * 3);

        // FRP range within the dot tier for colour lerp
        const dotFrpMax = dotPoints[0].frp;
        const dotFrpMin = dotPoints[dotPoints.length - 1].frp;
        const dotFrpRange = dotFrpMax - dotFrpMin || 1;

        const colLow  = new THREE.Color('#f97316');
        const colHigh = new THREE.Color('#ef4444');

        for (let i = 0; i < dotPoints.length; i++) {
          const { lat, lon, frp } = dotPoints[i];
          const [px, py] = project([lon, lat]);
          const worldX = px;
          const worldY = heightAt(px, py) + 0.01;
          const worldZ = -py;

          posArr[i * 3]     = worldX;
          posArr[i * 3 + 1] = worldY;
          posArr[i * 3 + 2] = worldZ;

          const t = (frp - dotFrpMin) / dotFrpRange;
          const col = colLow.clone().lerp(colHigh, t);
          colArr[i * 3]     = col.r;
          colArr[i * 3 + 1] = col.g;
          colArr[i * 3 + 2] = col.b;
        }

        dotGeo.setAttribute('position', new THREE.BufferAttribute(posArr, 3));
        dotGeo.setAttribute('color',    new THREE.BufferAttribute(colArr, 3));

        const dotMat = new THREE.PointsMaterial({
          vertexColors: true,
          size: 0.008,
          sizeAttenuation: true
        });

        scene.add(new THREE.Points(dotGeo, dotMat));
        console.log(`[map3d] added ${dotPoints.length} fire dots`);
      }

      // ---- Animated flame cones for top-1000 FRP points ------------------
      for (let i = 0; i < flamePoints.length; i++) {
        const { lat, lon, frp } = flamePoints[i];
        const [px, py] = project([lon, lat]);
        const worldX = px;
        const terrainY = heightAt(px, py) + 0.01;
        const worldZ = -py;

        const frpScale = Math.log(frp + 1) / Math.log(500);
        const baseRadius = frpScale * 0.008;
        const flameHeight = frpScale * 0.04;
        const phaseI = (i * 2.399963) % (Math.PI * 2);

        // Build per-vertex positions and colours
        // Layout: (HEIGHT_SEGS + 1) rings × RADIAL_SEGS vertices
        const totalVerts = (HEIGHT_SEGS + 1) * RADIAL_SEGS;
        const posData = new Float32Array(totalVerts * 3);
        const colData = new Float32Array(totalVerts * 3);

        for (let s = 0; s <= HEIGHT_SEGS; s++) {
          const t = s / HEIGHT_SEGS;
          const radius = baseRadius * (1 - t);
          const yPos   = flameHeight * t;
          const col    = flameColor(t);

          for (let r = 0; r < RADIAL_SEGS; r++) {
            const angle = (r / RADIAL_SEGS) * Math.PI * 2;
            const vi = s * RADIAL_SEGS + r;

            posData[vi * 3]     = Math.cos(angle) * radius;
            posData[vi * 3 + 1] = yPos;
            posData[vi * 3 + 2] = Math.sin(angle) * radius;

            colData[vi * 3]     = col.r;
            colData[vi * 3 + 1] = col.g;
            colData[vi * 3 + 2] = col.b;
          }
        }

        // Build index buffer: quads between adjacent rings + tip fan
        const indices = [];
        // Quads for rings 0 to HEIGHT_SEGS-2 (stops before the tip ring)
        for (let s = 0; s < HEIGHT_SEGS - 1; s++) {
          for (let r = 0; r < RADIAL_SEGS; r++) {
            const rNext = (r + 1) % RADIAL_SEGS;
            const v00 = s * RADIAL_SEGS + r;
            const v10 = s * RADIAL_SEGS + rNext;
            const v01 = (s + 1) * RADIAL_SEGS + r;
            const v11 = (s + 1) * RADIAL_SEGS + rNext;
            indices.push(v00, v10, v01);
            indices.push(v10, v11, v01);
          }
        }
        // Tip fan: last ring (HEIGHT_SEGS-1) to tip ring (HEIGHT_SEGS)
        const tipRingStart = (HEIGHT_SEGS - 1) * RADIAL_SEGS;
        const tipRing = HEIGHT_SEGS * RADIAL_SEGS;
        for (let r = 0; r < RADIAL_SEGS; r++) {
          const rNext = (r + 1) % RADIAL_SEGS;
          indices.push(tipRingStart + r, tipRingStart + rNext, tipRing + r);
        }

        const geometry = new THREE.BufferGeometry();
        geometry.setAttribute('position', new THREE.BufferAttribute(posData, 3));
        geometry.setAttribute('color',    new THREE.BufferAttribute(colData, 3));
        geometry.setIndex(indices);

        const material = new THREE.MeshBasicMaterial({
          vertexColors: true,
          side: THREE.DoubleSide,
          transparent: true,
          opacity: 0.9
        });

        const mesh = new THREE.Mesh(geometry, material);
        mesh.position.set(worldX, terrainY, worldZ);
        scene.add(mesh);

        flameGeometries.push({
          geo: geometry,
          mesh,
          baseX: worldX,
          baseY: terrainY,
          baseZ: worldZ,
          frpScale,
          phaseI,
          origPositions: posData.slice()
        });
      }

      console.log(`[map3d] built ${flameGeometries.length} flame meshes`);
    }

    /* ------------------------------------------------------------------ *
     * Flame sway animation
     * ------------------------------------------------------------------ */
    function animateFlames(t) {
      for (const flame of flameGeometries) {
        const pos  = flame.geo.attributes.position;
        const orig = flame.origPositions;
        const totalVerts = pos.count;

        for (let vi = 0; vi < totalVerts; vi++) {
          const ring    = Math.floor(vi / RADIAL_SEGS);
          const s       = ring;
          const segFrac = s / HEIGHT_SEGS;

          const taper = Math.pow(segFrac, 0.5);

          const swayX = SWAY_AMP * Math.sin(SWAY_FREQ * segFrac * t + flame.phaseI) * taper * flame.frpScale;
          const swayZ = SWAY_AMP * Math.cos(SWAY_FREQ * segFrac * t * 0.7 + flame.phaseI + Math.PI / 3) * taper * flame.frpScale;

          pos.setX(vi, orig[vi * 3]     + swayX);
          pos.setZ(vi, orig[vi * 3 + 2] + swayZ);
        }
        flame.geo.attributes.position.needsUpdate = true;
      }
    }

    function initGestures() {
      const video       = document.getElementById('webcam');
      const preview     = document.getElementById('webcam-preview');
      const statusBadge = document.getElementById('gesture-status');
      const guidePanel  = document.getElementById('gesture-guide');

      // Toggle gesture guide on badge click
      statusBadge.addEventListener('click', () => guidePanel.classList.toggle('open'));

      // ── Tuning ────────────────────────────────────────────────
      const ALPHA         = 0.25;   // EMA smoothing (lower = smoother)
      const K_ORBIT_H     = 3.5;
      const K_ORBIT_V     = 2.0;
      const K_ZOOM_VEL    = 0.40;   // velocity zoom gain per frame
      const PINCH_NEUTRAL = 0.065;  // pinch tightness at which zoom velocity = 0
      const MIN_R         = 1.0,  MAX_R   = 7.0;
      const MIN_PHI       = 5  * Math.PI / 180;
      const MAX_PHI       = 85 * Math.PI / 180;
      const PINCH_THRESH  = 0.12;   // thumb-index distance below this = pinching
      const K_PAN         = 1.8;    // pan speed (scales with camRadius)
      const PAN_LIMIT     = 1.5;    // max orbit-center offset from origin

      // Camera spherical coords, initialised from scene camera
      let camRadius = camera.position.length();
      let camTheta  = Math.atan2(camera.position.x, camera.position.z);
      let camPhi    = Math.acos(Math.max(-1, Math.min(1, camera.position.y / camRadius)));
      const DEF_R = camRadius, DEF_THETA = camTheta, DEF_PHI = camPhi;

      // ── EMA state ────────────────────────────────────────────
      let e_pinch = null, e_palmX = null, e_palmY = null;
      let p_pinch = null, p_palmX = null, p_palmY = null;
      // Pan state (orbit-center offset in world XZ)
      let panX = 0, panZ = 0;
      let e_ptX = null, e_ptY = null, p_ptX = null, p_ptY = null;

      function ema(prev, v) { return prev === null ? v : prev + ALPHA * (v - prev); }

      function updateCamera() {
        camPhi    = Math.max(MIN_PHI, Math.min(MAX_PHI,   camPhi));
        camRadius = Math.max(MIN_R,   Math.min(MAX_R, camRadius));
        panX = Math.max(-PAN_LIMIT, Math.min(PAN_LIMIT, panX));
        panZ = Math.max(-PAN_LIMIT, Math.min(PAN_LIMIT, panZ));
        camera.position.set(
          panX + camRadius * Math.sin(camPhi) * Math.sin(camTheta),
          camRadius * Math.cos(camPhi),
          panZ + camRadius * Math.sin(camPhi) * Math.cos(camTheta)
        );
        camera.lookAt(panX, 0, panZ);
      }

      function resetCamera() {
        camRadius = DEF_R; camTheta = DEF_THETA; camPhi = DEF_PHI;
        panX = 0; panZ = 0;
        updateCamera();
      }

      function setStatus(text, color) {
        statusBadge.textContent = text;
        statusBadge.style.borderColor = color || 'rgba(232,201,160,0.25)';
      }

      // Count extended fingers (index–pinky), excluding thumb
      function countExtended(lm) {
        const tips = [8, 12, 16, 20], pips = [6, 10, 14, 18];
        let n = 0;
        for (let i = 0; i < 4; i++) if (lm[tips[i]].y < lm[pips[i]].y) n++;
        return n;
      }

      function pinchDist(lm) {
        return Math.hypot(lm[4].x - lm[8].x, lm[4].y - lm[8].y);
      }

      // Point: only index finger extended, others curled
      function isPointing(lm) {
        return lm[8].y  < lm[6].y  &&   // index extended
               lm[12].y > lm[10].y &&   // middle curled
               lm[16].y > lm[14].y &&   // ring curled
               lm[20].y > lm[18].y;     // pinky curled
      }

      function clearAll() {
        e_pinch = e_palmX = e_palmY = p_pinch = p_palmX = p_palmY = null;
        e_ptX = e_ptY = p_ptX = p_ptY = null;
      }

      function onResults(results) {
        const handsList = results.multiHandLandmarks || [];

        if (handsList.length === 0) {
          clearAll();
          controls.enabled = true;
          setStatus('● Detecting');
          return;
        }
        controls.enabled = false;

        // ── SINGLE-HAND GESTURES ─────────────────────────────
        const lm     = handsList[0];
        const rawP   = pinchDist(lm);
        const extCnt = countExtended(lm);

        e_pinch = ema(e_pinch, rawP);
        e_palmX = ema(e_palmX, lm[9].x);
        e_palmY = ema(e_palmY, lm[9].y);

        if (extCnt === 0) {
          // ── ✊ Fist → grab-and-drag orbit ──────────────────────
          // Checked BEFORE pinch so a closed fist never triggers zoom.
          if (p_palmX !== null) {
            camTheta -= (e_palmX - p_palmX) * K_ORBIT_H;
            camPhi   -= (e_palmY - p_palmY) * K_ORBIT_V;
            updateCamera();
          }
          p_palmX = e_palmX; p_palmY = e_palmY;
          e_ptX = e_ptY = p_ptX = p_ptY = null;
          setStatus('✊ Orbit', '#60a5fa');

        } else if (isPointing(lm)) {
          // ── ☝️ Point → pan orbit center in map plane ──────────
          e_ptX = ema(e_ptX, lm[9].x);
          e_ptY = ema(e_ptY, lm[9].y);
          if (p_ptX !== null) {
            const dx = e_ptX - p_ptX;
            const dy = e_ptY - p_ptY;
            const speed = camRadius * K_PAN;
            // Camera right and forward vectors projected onto XZ plane
            const rX =  Math.cos(camTheta), rZ = -Math.sin(camTheta);
            const fX = -Math.sin(camTheta), fZ = -Math.cos(camTheta);
            panX += dx * speed * rX - dy * speed * fX;
            panZ += dx * speed * rZ - dy * speed * fZ;
            updateCamera();
          }
          p_ptX = e_ptX; p_ptY = e_ptY;
          p_palmX = null; p_palmY = null;
          setStatus('☝️ Pan', '#a78bfa');

        } else if (e_pinch < PINCH_THRESH) {
          // ── 🤏 Pinch → continuous velocity zoom ───────────────
          const vel = (PINCH_NEUTRAL - e_pinch) * K_ZOOM_VEL;
          camRadius *= (1 - vel);
          updateCamera();
          p_palmX = null; p_palmY = null;
          e_ptX = e_ptY = p_ptX = p_ptY = null;
          const dir   = vel >  0.002 ? '▲ in'
                      : vel < -0.002 ? '▼ out' : '● hold';
          const tight = Math.round((1 - e_pinch / PINCH_THRESH) * 100);
          setStatus(`🤏 Zoom ${dir}  ${tight}%`, '#f97316');

        } else {
          // ── ✋ Open palm → idle, safe to reposition ────────────
          p_palmX = null; p_palmY = null;
          e_ptX = e_ptY = p_ptX = p_ptY = null;
          setStatus('✋ Idle — free to reposition');
        }
      }

      // ── MediaPipe setup ───────────────────────────────────────
      if (typeof Hands === 'undefined' || typeof Camera === 'undefined') {
        console.warn('[map3d] MediaPipe not loaded — gesture control disabled');
        setStatus('Gesture lib unavailable');
        return;
      }
      const gestureHands = new Hands({
        locateFile: (file) =>
          `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/${file}`
      });
      gestureHands.setOptions({
        maxNumHands: 1,
        modelComplexity: 1,
        minDetectionConfidence: 0.7,
        minTrackingConfidence: 0.5
      });
      gestureHands.onResults(onResults);

      const mpCamera = new Camera(video, {
        onFrame: async () => { await gestureHands.send({ image: video }); },
        width: 320,
        height: 240
      });
      mpCamera.start().then(() => {
        preview.style.display  = 'block';
        video.style.position   = 'static';
        video.style.top        = '';
        video.style.left       = '';
        video.style.transform  = '';
        video.style.width      = '100%';
        video.style.height     = '100%';
        video.style.objectFit  = 'cover';
        video.style.opacity    = '1';
        preview.appendChild(video);
      }).catch(err => {
        console.warn('[map3d] Webcam unavailable:', err);
        setStatus('No camera');
      });

      setStatus('● Detecting');
    }

    /* ------------------------------------------------------------------ *
     * Resize + animation loop
     * ------------------------------------------------------------------ */
    function onResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }
    window.addEventListener('resize', onResize);

    const clock = new THREE.Clock();
    function animate() {
      requestAnimationFrame(animate);
      const elapsed = clock.getElapsedTime();
      if (controls.enabled) controls.update();
      animateFlames(elapsed);
      renderer.render(scene, camera);
    }

    // Kick everything off.
    loadDEM()
      .then(() => buildTerrain())
      .then(() => loadFireData())
      .then((points) => buildFlames(points))
      .catch((err) => console.error('[map3d] init error', err));
    initGestures();
    animate();
  </script>
</body>
</html>
