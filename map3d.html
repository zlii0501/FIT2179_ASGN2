<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Black Summer — 3D Fire Map</title>

  <!-- Three.js r160 (ES modules via importmap) -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <style>
    :root {
      --bg: #111827;
      --text: #e8c9a0;
      --accent: #c0392b;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: Georgia, 'Times New Roman', serif;
    }

    /* Three.js renderer canvas fills the viewport */
    #scene-canvas {
      display: block;
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    /* Hidden webcam feed (MediaPipe input, task 3) */
    #webcam {
      position: fixed;
      top: 0;
      left: 0;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
      transform: scaleX(-1); /* mirror so it reads naturally */
    }

    /* Debug overlay for hand landmark dots (task 3) */
    #debug-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 0;
      height: 0;
      pointer-events: none;
      z-index: 30;
    }

    /* Back-to-story link */
    #back-link {
      position: fixed;
      top: 20px;
      left: 24px;
      z-index: 40;
      color: var(--text);
      text-decoration: none;
      font-size: 1rem;
      letter-spacing: 0.03em;
      padding: 8px 14px;
      background: rgba(6, 10, 18, 0.55);
      border: 1px solid rgba(232, 201, 160, 0.25);
      border-radius: 4px;
      transition: color 0.2s ease, border-color 0.2s ease;
    }
    #back-link:hover {
      color: #fff;
      border-color: var(--accent);
    }

    /* Webcam preview thumbnail (task 3 populates contents) */
    #webcam-preview {
      position: fixed;
      right: 24px;
      bottom: 70px;
      z-index: 40;
      width: 100px;
      height: 75px;
      border: 1px solid rgba(232, 201, 160, 0.3);
      border-radius: 4px;
      background: rgba(6, 10, 18, 0.7);
      overflow: hidden;
    }

    /* Gesture status badge (content from task 3) */
    #gesture-status {
      position: fixed;
      right: 24px;
      bottom: 24px;
      z-index: 40;
      min-width: 100px;
      padding: 6px 12px;
      font-size: 0.8rem;
      text-align: center;
      color: var(--text);
      background: rgba(6, 10, 18, 0.7);
      border: 1px solid rgba(232, 201, 160, 0.25);
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <!-- MediaPipe input (hidden) -->
  <video id="webcam" autoplay playsinline muted></video>

  <!-- Hand-landmark debug overlay (task 3) -->
  <canvas id="debug-canvas"></canvas>

  <!-- Three.js renderer target -->
  <canvas id="scene-canvas"></canvas>

  <!-- Navigation back to the main story -->
  <a id="back-link" href="index.html">&larr; Return to story</a>

  <!-- Webcam preview + gesture badge (task 3) -->
  <div id="webcam-preview"></div>
  <div id="gesture-status">Gestures: off</div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    /* ------------------------------------------------------------------ *
     * Scene bootstrap
     * ------------------------------------------------------------------ */
    const canvas = document.getElementById('scene-canvas');

    const scene = new THREE.Scene();

    const camera = new THREE.PerspectiveCamera(
      50,
      window.innerWidth / window.innerHeight,
      0.1,
      100
    );
    camera.position.set(0, 1.8, 2.5);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setClearColor('#060a12');

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 0, 0);
    controls.update();

    // Ambient fill
    const ambient = new THREE.AmbientLight('#ffffff', 0.4);
    scene.add(ambient);

    // Warm point light over the NSW coast fire cluster
    const fireLight = new THREE.PointLight('#f97316', 1.5);
    fireLight.position.set(0.3, 0.8, 0.1);
    scene.add(fireLight);

    /* ------------------------------------------------------------------ *
     * Ocean plane
     * ------------------------------------------------------------------ */
    const oceanGeo = new THREE.PlaneGeometry(6, 6);
    const oceanMat = new THREE.MeshStandardMaterial({
      color: '#060a12',
      roughness: 1,
      metalness: 0
    });
    const ocean = new THREE.Mesh(oceanGeo, oceanMat);
    ocean.rotation.x = -Math.PI / 2;
    ocean.position.y = -0.02;
    scene.add(ocean);

    /* ------------------------------------------------------------------ *
     * Projection: lon/lat -> normalised [-1, 1] space (Mercator-ish)
     * ------------------------------------------------------------------ */
    function project([lon, lat]) {
      const x = (lon - 113) / (154 - 113) * 2 - 1;
      const y = (lat - (-44)) / ((-10) - (-44)) * 2 - 1;
      return [x * 1.1, y * 0.9]; // slight scale to fill view
    }

    /* ------------------------------------------------------------------ *
     * Point-in-polygon (ray casting), tested against a set of rings.
     * `rings` is an array of rings; each ring is [[x, y], ...].
     * A point is inside Australia if inside an odd number of crossings
     * within ANY single ring.
     * ------------------------------------------------------------------ */
    function pointInRing(px, py, ring) {
      let inside = false;
      for (let i = 0, j = ring.length - 1; i < ring.length; j = i++) {
        const xi = ring[i][0], yi = ring[i][1];
        const xj = ring[j][0], yj = ring[j][1];
        const intersect =
          (yi > py) !== (yj > py) &&
          px < ((xj - xi) * (py - yi)) / (yj - yi) + xi;
        if (intersect) inside = !inside;
      }
      return inside;
    }

    function pointInRings(px, py, rings) {
      for (let r = 0; r < rings.length; r++) {
        if (pointInRing(px, py, rings[r])) return true;
      }
      return false;
    }

    /* ------------------------------------------------------------------ *
     * Height field
     * ------------------------------------------------------------------ */
    // Coherent value noise via bilinear interpolation over a coarse lattice
    function valueLattice(ix, iy, seed) {
      const n = Math.sin(ix * 127.1 + iy * 311.7 + seed * 74.3) * 43758.5453;
      return n - Math.floor(n);
    }

    function smoothNoise(x, y, scale, seed) {
      const sx = x * scale, sy = y * scale;
      const ix = Math.floor(sx), iy = Math.floor(sy);
      const fx = sx - ix, fy = sy - iy;
      // Smooth step
      const ux = fx * fx * (3 - 2 * fx);
      const uy = fy * fy * (3 - 2 * fy);
      const v00 = valueLattice(ix,   iy,   seed);
      const v10 = valueLattice(ix+1, iy,   seed);
      const v01 = valueLattice(ix,   iy+1, seed);
      const v11 = valueLattice(ix+1, iy+1, seed);
      return v00*(1-ux)*(1-uy) + v10*ux*(1-uy) + v01*(1-ux)*uy + v11*ux*uy;
    }

    function heightAt(x, y) {
      let h = 0;
      h += smoothNoise(x, y, 2, 0) * 0.5;
      h += smoothNoise(x, y, 4, 1) * 0.25;
      h += smoothNoise(x, y, 8, 2) * 0.125;
      h = h / 0.875; // normalise to ~[0,1]
      // Great Dividing Range: gaussian ridge along east coast (projected x ≈ 0.8)
      const ridge = Math.exp(-Math.pow((x - 0.8) / 0.15, 2)) * 0.4;
      h = Math.min(h + ridge, 1.0) * 0.5;
      return h;
    }

    function heightToColor(h) {
      if (h < 0.05)  return new THREE.Color('#1a3a2a'); // coastal plains
      if (h < 0.15)  return new THREE.Color('#2a5038'); // low hills
      if (h < 0.30)  return new THREE.Color('#3d6e4a'); // highlands
      return new THREE.Color('#5a7a4a');                // peaks
    }

    /* ------------------------------------------------------------------ *
     * Bowyer-Watson Delaunay triangulation
     * Returns array of [i, j, k] index triples into the supplied points.
     * ------------------------------------------------------------------ */
    function circumcircle(a, b, c) {
      const ax = a[0], ay = a[1];
      const bx = b[0], by = b[1];
      const cx = c[0], cy = c[1];
      const d = 2 * (ax * (by - cy) + bx * (cy - ay) + cx * (ay - by));
      if (Math.abs(d) < 1e-12) {
        return { cx: 0, cy: 0, r: Infinity };
      }
      const a2 = ax * ax + ay * ay;
      const b2 = bx * bx + by * by;
      const c2 = cx * cx + cy * cy;
      const ux = (a2 * (by - cy) + b2 * (cy - ay) + c2 * (ay - by)) / d;
      const uy = (a2 * (cx - bx) + b2 * (ax - cx) + c2 * (bx - ax)) / d;
      const dx = ux - ax;
      const dy = uy - ay;
      return { cx: ux, cy: uy, r: Math.sqrt(dx * dx + dy * dy) };
    }

    function delaunay(points) {
      const n = points.length;
      if (n < 3) return [];

      // Bounding box of the points
      let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
      for (const p of points) {
        if (p[0] < minX) minX = p[0];
        if (p[1] < minY) minY = p[1];
        if (p[0] > maxX) maxX = p[0];
        if (p[1] > maxY) maxY = p[1];
      }
      const dx = maxX - minX || 1;
      const dy = maxY - minY || 1;
      const dmax = Math.max(dx, dy);
      const midX = (minX + maxX) / 2;
      const midY = (minY + maxY) / 2;

      // Super-triangle vertices appended to the working point list.
      // Indices n, n+1, n+2 reference the super-triangle.
      const sp0 = [midX - 20 * dmax, midY - dmax];
      const sp1 = [midX, midY + 20 * dmax];
      const sp2 = [midX + 20 * dmax, midY - dmax];
      const pts = points.concat([sp0, sp1, sp2]);

      const superA = n, superB = n + 1, superC = n + 2;

      // A triangle stores its vertex indices and its circumcircle.
      function makeTri(i, j, k) {
        const cc = circumcircle(pts[i], pts[j], pts[k]);
        return { i, j, k, cc };
      }

      let triangulation = [makeTri(superA, superB, superC)];

      for (let pi = 0; pi < n; pi++) {
        const p = pts[pi];
        const badTriangles = [];

        for (const t of triangulation) {
          const ddx = p[0] - t.cc.cx;
          const ddy = p[1] - t.cc.cy;
          if (ddx * ddx + ddy * ddy < t.cc.r * t.cc.r) {
            badTriangles.push(t);
          }
        }

        // Build the boundary polygon: edges that appear in exactly one bad triangle.
        const edgeCount = new Map();
        const edgeKey = (a, b) => (a < b ? a + '_' + b : b + '_' + a);

        for (const t of badTriangles) {
          const edges = [
            [t.i, t.j],
            [t.j, t.k],
            [t.k, t.i]
          ];
          for (const [a, b] of edges) {
            const key = edgeKey(a, b);
            const entry = edgeCount.get(key);
            if (entry) {
              entry.count++;
            } else {
              edgeCount.set(key, { a, b, count: 1 });
            }
          }
        }

        // Remove the bad triangles.
        const badSet = new Set(badTriangles);
        triangulation = triangulation.filter((t) => !badSet.has(t));

        // Re-triangulate the polygonal hole with the new point.
        for (const { a, b, count } of edgeCount.values()) {
          if (count === 1) {
            triangulation.push(makeTri(a, b, pi));
          }
        }
      }

      // Drop any triangle that touches the super-triangle vertices.
      const result = [];
      for (const t of triangulation) {
        if (
          t.i === superA || t.i === superB || t.i === superC ||
          t.j === superA || t.j === superB || t.j === superC ||
          t.k === superA || t.k === superB || t.k === superC
        ) {
          continue;
        }
        result.push([t.i, t.j, t.k]);
      }
      return result;
    }

    /* ------------------------------------------------------------------ *
     * Build the terrain from the GeoJSON
     * ------------------------------------------------------------------ */
    async function buildTerrain() {
      const res = await fetch('data/australia_states.geojson');
      const geojson = await res.json();

      // 5a. Extract the outer ring of every polygon, projected to [-1,1].
      const allRings = [];          // projected rings, for point-in-polygon
      const coastVertices = [];     // projected coastline vertices to keep

      for (const feature of geojson.features) {
        const geom = feature.geometry;
        if (!geom) continue;

        let polygons = [];
        if (geom.type === 'Polygon') {
          polygons = [geom.coordinates];
        } else if (geom.type === 'MultiPolygon') {
          polygons = geom.coordinates;
        } else {
          continue;
        }

        for (const poly of polygons) {
          // poly[0] is the outer ring (subsequent entries are holes).
          const outer = poly[0];
          if (!outer || outer.length < 3) continue;
          const projected = outer.map(project);
          allRings.push(projected);
          // Decimate coast vertices before triangulation: skip tiny offshore
          // islands and stride-sample longer rings to ~100 points each.
          if (projected.length < 20) continue; // skip tiny islands
          const stride = Math.max(1, Math.floor(projected.length / 100));
          for (let vi = 0; vi < projected.length; vi += stride) {
            coastVertices.push(projected[vi]);
          }
        }
      }

      // 5d. Regular grid sampling over [-1.1, 1.1] x [-0.9, 0.9].
      const GRID_X = 80;
      const GRID_Y = 60;
      const X_MIN = -1.1, X_MAX = 1.1;
      const Y_MIN = -0.9, Y_MAX = 0.9;

      const interiorPoints = [];
      for (let ix = 0; ix < GRID_X; ix++) {
        const px = X_MIN + (X_MAX - X_MIN) * (ix / (GRID_X - 1));
        for (let iy = 0; iy < GRID_Y; iy++) {
          const py = Y_MIN + (Y_MAX - Y_MIN) * (iy / (GRID_Y - 1));
          if (pointInRings(px, py, allRings)) {
            interiorPoints.push([px, py]);
          }
        }
      }

      // Combine interior grid points + coastline vertices, de-duplicating
      // near-coincident points so the triangulation stays robust.
      const points2D = [];
      const seen = new Set();
      const addPoint = (p) => {
        const key = p[0].toFixed(4) + ',' + p[1].toFixed(4);
        if (seen.has(key)) return;
        seen.add(key);
        points2D.push(p);
      };
      for (const p of interiorPoints) addPoint(p);
      for (const p of coastVertices) addPoint(p);

      // 5e. Triangulate.
      const tris = delaunay(points2D);

      // 5f. Height per point.
      const heights = new Float32Array(points2D.length);
      for (let i = 0; i < points2D.length; i++) {
        heights[i] = heightAt(points2D[i][0], points2D[i][1]);
      }

      // Keep only triangles whose centroid lies inside Australia, so the
      // mesh follows the coastline rather than filling the convex hull.
      const keptTris = [];
      for (const [i, j, k] of tris) {
        const cx = (points2D[i][0] + points2D[j][0] + points2D[k][0]) / 3;
        const cy = (points2D[i][1] + points2D[j][1] + points2D[k][1]) / 3;
        if (pointInRings(cx, cy, allRings)) {
          keptTris.push([i, j, k]);
        }
      }

      // 5g. Build a non-indexed BufferGeometry (flat shading, per-face colour).
      const positions = [];
      const normals = [];
      const colors = [];

      const va = new THREE.Vector3();
      const vb = new THREE.Vector3();
      const vc = new THREE.Vector3();
      const e1 = new THREE.Vector3();
      const e2 = new THREE.Vector3();
      const nrm = new THREE.Vector3();

      for (const [i, j, k] of keptTris) {
        // 3D positions: (px, height, -py)
        va.set(points2D[i][0], heights[i], -points2D[i][1]);
        vb.set(points2D[j][0], heights[j], -points2D[j][1]);
        vc.set(points2D[k][0], heights[k], -points2D[k][1]);

        // Flat face normal via cross product.
        e1.subVectors(vb, va);
        e2.subVectors(vc, va);
        nrm.crossVectors(e1, e2).normalize();
        if (nrm.y < 0) nrm.negate(); // keep normals pointing up

        // Per-face colour from average height.
        const avgH = (heights[i] + heights[j] + heights[k]) / 3;
        const col = heightToColor(avgH);

        for (const v of [va, vb, vc]) {
          positions.push(v.x, v.y, v.z);
          normals.push(nrm.x, nrm.y, nrm.z);
          colors.push(col.r, col.g, col.b);
        }
      }

      const geometry = new THREE.BufferGeometry();
      geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
      geometry.setAttribute('normal', new THREE.Float32BufferAttribute(normals, 3));
      geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));

      const material = new THREE.MeshStandardMaterial({
        vertexColors: true,
        flatShading: true,
        roughness: 0.9,
        metalness: 0
      });

      const terrain = new THREE.Mesh(geometry, material);
      scene.add(terrain);

      console.log(
        `[map3d] terrain built: ${points2D.length} points, ${keptTris.length} triangles`
      );
    }

    /* ------------------------------------------------------------------ *
     * Stubs for later tasks
     * ------------------------------------------------------------------ */
    // Task 2 will replace these
    const flameGeometries = [];
    function animateFlames(t) {}

    // Task 3 will replace these
    function initGestures() {}

    /* ------------------------------------------------------------------ *
     * Resize + animation loop
     * ------------------------------------------------------------------ */
    function onResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }
    window.addEventListener('resize', onResize);

    const clock = new THREE.Clock();
    function animate() {
      requestAnimationFrame(animate);
      const elapsed = clock.getElapsedTime();
      controls.update();
      animateFlames(elapsed);
      renderer.render(scene, camera);
    }

    // Kick everything off.
    buildTerrain().catch((err) => console.error('[map3d] terrain error', err));
    initGestures();
    animate();
  </script>
</body>
</html>
